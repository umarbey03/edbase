<!DOCTYPE html>
<html lang="uz">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="../photos/favicon-32x32.png">
    <title>Kurs sahifasi | EdBase</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50 text-gray-800">

    <!-- 🔹 Header -->
    <header class="bg-white shadow p-4 flex justify-between items-center">
        <h1 class="text-lg font-bold">EdBase</h1>
        <div class="text-sm">Salom, <span id="studentName">Talaba</span></div>
    </header>

    <!-- Breadcrumb navigatsiya -->
    <div class="max-w-7xl mx-auto mt-6 px-4">
        <button id="breadcrumb" class="text-sm text-indigo-600 hover:underline">
            ← Oldingi sahifaga qaytish
        </button>
    </div>

    <div class="max-w-7xl mx-auto px-4 mt-2">
            <h2 id="courseName" class="text-xl font-bold text-gray-700">📘 Kurs nomi</h2>
        </div>
    <!-- 🔸 Layout -->
    <main class="max-w-7xl mx-auto grid md:grid-cols-3 gap-6 mt-8 px-4">
        <!-- 🔹 Video & kontent -->
        <section class="md:col-span-2 space-y-4">
            <div class="bg-white rounded-xl shadow overflow-hidden">
                <video id="lessonVideo" class="w-full" controls poster="https://via.placeholder.com/800x400">
                    <source id="videoSource" src="" type="video/mp4" />
                    Brauzeringiz video formatini qo‘llab-quvvatlamaydi.
                </video>
            </div>

            <div class="bg-white rounded-xl shadow p-4">
                <h2 class="text-xl font-semibold mb-2" id="lessonTitle">Dars nomi</h2>
                <p id="lessonDescription" class="text-gray-700">Dars haqida qisqacha ma'lumot...</p>

                <div class="flex flex-wrap items-center justify-between mt-4 gap-2">
                    <button id="markCompleted"
                        class="text-sm px-4 py-2 rounded bg-green-600 text-white hover:bg-green-700">
                        ✅ Tugatildi
                    </button>

                    <button id="leaveReviewBtn" class="text-sm text-indigo-600 hover:underline">
                        💬 Sharh qoldirish
                    </button>

                    <button id="startQuiz"
                        class="text-sm px-4 py-2 rounded bg-yellow-500 text-white hover:bg-yellow-600 hidden">
                        📝 Testni boshlash
                    </button>
                </div>
            </div>

            <!-- 🔹 Sharh formasi -->
            <div class="bg-white rounded-xl shadow p-4 hidden" id="reviewForm">
                <label class="block mb-2 font-medium">Baholash (1–5):</label>
                <select id="rating" class="border px-3 py-1 rounded">
                    <option value="5">5 - Zo‘r</option>
                    <option value="4">4 - Yaxshi</option>
                    <option value="3">3 - O‘rtacha</option>
                    <option value="2">2 - Yomon</option>
                    <option value="1">1 - Juda yomon</option>
                </select>
                <textarea id="reviewText" class="w-full mt-3 border rounded p-2" rows="3"
                    placeholder="Izoh..."></textarea>
                <button id="submitReview"
                    class="mt-3 px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700">Yuborish</button>
            </div>
        </section>

        <!-- 🔹 Yon panel -->
        <aside class="bg-white rounded-xl shadow p-4 space-y-3 h-fit">
            <h3 class="font-bold text-lg">Darslar</h3>
            <ul id="lessonList" class="space-y-2 text-sm"></ul>
            <button id="completeCourse" class="w-full mt-6 bg-indigo-600 text-white px-4 py-2 rounded hidden">Kursni
                tugatdim</button>
        </aside>
    </main>

    <script>
        const previousPage = localStorage.getItem("previousPage");

        let breadcrumbText = "Bosh sahifa";

        if (previousPage === "dashboard") {
            breadcrumbText = "Dashboard";
        } else if (previousPage === "courses") {
            breadcrumbText = "Kurslar ro'yxati";
        }

        // 📍 breadcrumb ni sahifaga chiqaramiz
        const breadcrumb = document.getElementById("breadcrumb");
        breadcrumb.textContent = `← ${breadcrumbText} sahifaga qaytish`;
        breadcrumb.onclick = () => {
            if (previousPage === "dashboard") {
                window.location.href = "dashboard.html";
            } else {
                window.location.href = "courses.html";
            }
        };

    </script>

    <script type="module" src="./course.js"></script>
</body>

</html>
